<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>통신사 선택</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <header class="header">
      <span class="step-indicator">1/2 단계</span>
    </header>
    
    <main class="main-content">
      <div class="text-section">
        <p class="subtitle">빠르게 시작해볼까요?</p>
        <h1 class="title">사용 중인 통신사를<br>골라주세요.</h1>
      </div>
      
      <div class="telecom-buttons">
        <!-- LG U+ -->
        <div class="circle-wrap lgu-wrap">
          <button class="circle-btn lgu" data-telecom="LGU+">
            <div class="logo-container">
              <img src="logo-lgu.svg" alt="LG U+">
            </div>
          </button>
        </div>
        
        <!-- SKT -->
        <div class="circle-wrap skt-wrap">
          <button class="circle-btn skt" data-telecom="SKT">
            <div class="logo-container">
              <img src="logo-skt.svg" alt="SKT">
            </div>
          </button>
        </div>

        <!-- KT -->
        <div class="circle-wrap kt-wrap">
          <button class="circle-btn kt" data-telecom="KT">
            <div class="logo-container">
              <img src="logo-kt.svg" alt="KT">
            </div>
          </button>
        </div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
